name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vdbmat-utils-minimal:
    name: vdbmat-utils (minimal install)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vdbmat-utils
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v5
      - name: Sync (no extras)
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy src
      - name: Unit and contract tests
        run: uv run pytest -m "not integration"
      - name: Minimal-install workflows (PGM stack, STL mesh, previews)
        run: |
          uv run python -c "
          from pathlib import Path
          from vdbmat_utils.fixtures import write_image_stack_fixture, write_mesh_fixture
          _, stack_config = write_image_stack_fixture(Path('/tmp/minimal/slices'))
          Path('/tmp/minimal/stack.json').write_text(stack_config.to_json(), encoding='utf-8')
          _, mesh_config = write_mesh_fixture(Path('/tmp/minimal/mesh'))
          Path('/tmp/minimal/mesh.json').write_text(mesh_config.to_json(), encoding='utf-8')
          "
          uv run vdbmat-utils convert-image-stack /tmp/minimal/slices --config /tmp/minimal/stack.json --out /tmp/minimal/out --name stack
          uv run vdbmat-utils voxelize-mesh /tmp/minimal/mesh/l_bracket.stl --config /tmp/minimal/mesh.json --out /tmp/minimal/out --name bracket
          uv run vdbmat-utils validate /tmp/minimal/out/stack.voxels.json
          uv run vdbmat-utils validate /tmp/minimal/out/bracket.voxels.json
          uv run vdbmat-utils preview-slices /tmp/minimal/out/bracket.voxels.json --axis z
          uv run vdbmat-utils material-counts /tmp/minimal/out/bracket.voxels.json --json
      - name: Minimal-install Phase 2 workflows (morph, pipeline — no extras needed)
        run: |
          uv run python -c "
          from pathlib import Path
          from vdbmat_utils.fixtures import write_morph_fixture, write_pipeline_fixture
          _, morph_config = write_morph_fixture(Path('/tmp/minimal2/keyslices'))
          Path('/tmp/minimal2/morph.json').write_text(morph_config.to_json(), encoding='utf-8')
          write_pipeline_fixture(Path('/tmp/minimal2/assets'))
          "
          uv run vdbmat-utils morph-stack /tmp/minimal2/keyslices --config /tmp/minimal2/morph.json --out /tmp/minimal2/out --name morphed
          uv run vdbmat-utils apply-pipeline --config /tmp/minimal2/assets/pipeline.json --out /tmp/minimal2/out --name composed --dry-run
          uv run vdbmat-utils apply-pipeline --config /tmp/minimal2/assets/pipeline.json --out /tmp/minimal2/out --name composed
          uv run vdbmat-utils validate /tmp/minimal2/out/morphed.voxels.json
          uv run vdbmat-utils validate /tmp/minimal2/out/composed.voxels.json
      - name: Minimal-install Phase 3 workflows (formations — no extras needed)
        run: |
          uv run vdbmat-utils generate-formation --config examples/formation_generation/marble-like.formation.json --out /tmp/minimal3/out --name marble-like --strict
          uv run vdbmat-utils generate-formation --config examples/formation_generation/granite-like.formation.json --out /tmp/minimal3/out --name granite-like --strict
          uv run vdbmat-utils formation-stats /tmp/minimal3/out/marble-like.voxels.json --constraints examples/formation_generation/marble-like.formation.json --out /tmp/minimal3/out/marble-like.recomputed.stats.json
          uv run vdbmat-utils validate /tmp/minimal3/out/marble-like.voxels.json
          uv run vdbmat-utils validate /tmp/minimal3/out/granite-like.voxels.json
          uv run vdbmat import-voxels /tmp/minimal3/out/marble-like.voxels.json /tmp/minimal3/marble-like.zarr
          uv run vdbmat convert /tmp/minimal3/marble-like.zarr /tmp/minimal3/marble-like-optical.zarr --mapping-file /tmp/minimal3/out/marble-like.optical-mapping.json
          uv run vdbmat import-voxels /tmp/minimal3/out/granite-like.voxels.json /tmp/minimal3/granite-like.zarr
          uv run vdbmat convert /tmp/minimal3/granite-like.zarr /tmp/minimal3/granite-like-optical.zarr --mapping-file /tmp/minimal3/out/granite-like.optical-mapping.json

  vdbmat-utils-integration:
    name: vdbmat-utils (integration with pinned vdbmat CLI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vdbmat-utils
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v5
      - name: Sync (all extras)
        run: uv sync --all-extras
      - name: Unit and contract tests (with extras, PNG included)
        run: uv run pytest -m "not integration"
      - name: Integration tests
        run: uv run pytest -m integration
      - name: Phase 0 exit criteria
        run: |
          uv run vdbmat-utils generate-fixture multimaterial -o /tmp/exit-criteria
          uv run vdbmat-utils inspect /tmp/exit-criteria/multimaterial.voxels.json
          uv run vdbmat-utils validate /tmp/exit-criteria/multimaterial.voxels.json
          uv run vdbmat import-voxels /tmp/exit-criteria/multimaterial.voxels.json /tmp/exit-criteria/multimaterial.zarr
      - name: Phase 1 exit criteria
        run: |
          uv run python -c "
          from pathlib import Path
          from vdbmat_utils.fixtures import write_image_stack_fixture, write_mesh_fixture
          _, stack_config = write_image_stack_fixture(Path('/tmp/phase1/slices'))
          Path('/tmp/phase1/stack.json').write_text(stack_config.to_json(), encoding='utf-8')
          _, mesh_config = write_mesh_fixture(Path('/tmp/phase1/mesh'))
          Path('/tmp/phase1/mesh.json').write_text(mesh_config.to_json(), encoding='utf-8')
          "
          uv run vdbmat-utils convert-image-stack /tmp/phase1/slices --config /tmp/phase1/stack.json --out /tmp/phase1/out --name stack
          uv run vdbmat-utils voxelize-mesh /tmp/phase1/mesh/l_bracket.stl --config /tmp/phase1/mesh.json --out /tmp/phase1/out --name bracket
          uv run vdbmat-utils validate /tmp/phase1/out/stack.voxels.json
          uv run vdbmat-utils validate /tmp/phase1/out/bracket.voxels.json
          uv run vdbmat import-voxels /tmp/phase1/out/stack.voxels.json /tmp/phase1/stack.zarr
          uv run vdbmat convert /tmp/phase1/stack.zarr /tmp/phase1/stack-optical.zarr
          uv run vdbmat import-voxels /tmp/phase1/out/bracket.voxels.json /tmp/phase1/bracket.zarr
          uv run vdbmat convert /tmp/phase1/bracket.zarr /tmp/phase1/bracket-optical.zarr
      - name: Phase 2 exit criteria
        run: |
          uv run python -c "
          from pathlib import Path
          from vdbmat_utils.fixtures import write_morph_fixture, write_pipeline_fixture
          _, morph_config = write_morph_fixture(Path('/tmp/phase2/keyslices'))
          Path('/tmp/phase2/morph.json').write_text(morph_config.to_json(), encoding='utf-8')
          write_pipeline_fixture(Path('/tmp/phase2/assets'))
          "
          uv run vdbmat-utils morph-stack /tmp/phase2/keyslices --config /tmp/phase2/morph.json --out /tmp/phase2/out --name morphed
          uv run vdbmat-utils apply-pipeline --config /tmp/phase2/assets/pipeline.json --out /tmp/phase2/out --name composed
          uv run vdbmat-utils validate /tmp/phase2/out/morphed.voxels.json
          uv run vdbmat-utils validate /tmp/phase2/out/composed.voxels.json
          uv run vdbmat import-voxels /tmp/phase2/out/morphed.voxels.json /tmp/phase2/morphed.zarr
          uv run vdbmat convert /tmp/phase2/morphed.zarr /tmp/phase2/morphed-optical.zarr
          uv run vdbmat import-voxels /tmp/phase2/out/composed.voxels.json /tmp/phase2/composed.zarr
          uv run vdbmat convert /tmp/phase2/composed.zarr /tmp/phase2/composed-optical.zarr
      - name: Phase 3 exit criteria
        run: |
          uv run vdbmat-utils generate-formation --config examples/formation_generation/marble-like.formation.json --out /tmp/phase3/out --name marble-like --strict
          uv run vdbmat-utils generate-formation --config examples/formation_generation/granite-like.formation.json --out /tmp/phase3/out --name granite-like --strict
          uv run vdbmat-utils sweep-formation --config examples/formation_generation/tiny-sweep.sweep.json --out /tmp/phase3/sweep --name tiny
          uv run vdbmat-utils formation-stats /tmp/phase3/out/granite-like.voxels.json --constraints examples/formation_generation/granite-like.formation.json --out /tmp/phase3/out/granite-like.recomputed.stats.json
          uv run vdbmat-utils validate /tmp/phase3/out/marble-like.voxels.json
          uv run vdbmat-utils validate /tmp/phase3/out/granite-like.voxels.json
          uv run vdbmat import-voxels /tmp/phase3/out/marble-like.voxels.json /tmp/phase3/marble-like.zarr
          uv run vdbmat mapping-digest /tmp/phase3/out/marble-like.optical-mapping.json
          uv run vdbmat convert /tmp/phase3/marble-like.zarr /tmp/phase3/marble-like-optical.zarr --mapping-file /tmp/phase3/out/marble-like.optical-mapping.json
          uv run vdbmat import-voxels /tmp/phase3/out/granite-like.voxels.json /tmp/phase3/granite-like.zarr
          uv run vdbmat mapping-digest /tmp/phase3/out/granite-like.optical-mapping.json
          uv run vdbmat convert /tmp/phase3/granite-like.zarr /tmp/phase3/granite-like-optical.zarr --mapping-file /tmp/phase3/out/granite-like.optical-mapping.json
